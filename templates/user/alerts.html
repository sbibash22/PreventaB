{% extends "user/base_user.html" %}
{% block content %}
<div class="p-4 rounded-xl bg-white dark:bg-slate-900 border">
  {% for a in alerts %}
    <div class="p-3 rounded-xl border border-slate-200 dark:border-slate-800 mb-2">
      <div class="flex flex-wrap items-start justify-between gap-2">
        <div class="font-bold">[{{ a.risk_level }}] {{ a.subject }}</div>
        <div class="text-xs opacity-70">{{ a.created_at }}</div>
      </div>
      <div class="text-sm opacity-80 mt-1">{{ a.message|truncatechars:180 }}</div>
      <div class="mt-2">
        <a class="underline" href="{% url 'ack_alert_user' a.pk %}">Acknowledge</a>
      </div>
    </div>
  {% empty %}
    <div class="opacity-70">No alerts.</div>
  {% endfor %}
</div>
{% endblock %}
