{% extends "admin/base_admin.html" %}
{% block content %}
<div class="max-w-2xl">
  <div class="mb-4">
    <h2 class="text-lg font-semibold">{{ page_title }}</h2>
    <p class="text-sm opacity-70">A secure setup email will be sent so the user can set their password.</p>
  </div>

  <form method="post" class="p-5 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-4">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:opacity-90 transition">
      Save
    </button>
  </form>
</div>
{% endblock %}
