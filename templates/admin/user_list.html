{% extends "admin/base_admin.html" %}
{% block content %}
<div class="flex justify-between items-center mb-4">
  <h2 class="text-lg font-semibold">Users</h2>
  <a class="px-3 py-2 rounded-lg bg-blue-600 text-white hover:opacity-90 transition" href="{% url 'user_add' %}">
    + Add User
  </a>
</div>

<div class="p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 overflow-x-auto">
  <table class="w-full text-sm">
    <thead>
      <tr class="text-left">
        <th class="py-2">Username</th>
        <th>Email</th>
        <th>Role</th>
        <th class="text-right">Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for u in users %}
      <tr class="border-t border-slate-200 dark:border-slate-800">
        <td class="py-2 font-semibold">{{ u.username }}</td>
        <td class="opacity-80">{{ u.email }}</td>
        <td>{{ u.role }}</td>
        <td class="text-right">
          <a class="underline mr-3" href="{% url 'user_edit' u.pk %}">Edit</a>
          <a class="underline text-red-500" href="{% url 'user_delete' u.pk %}">Delete</a>
        </td>
      </tr>
      {% empty %}
      <tr><td class="py-3 opacity-70" colspan="4">No users found.</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
