{% extends "admin/base_admin.html" %}
{% block content %}
<div class="p-5 rounded-xl bg-white dark:bg-slate-900 border max-w-xl">
  <div class="text-lg font-bold mb-1">{{ alert.subject }}</div>
  <div class="text-sm opacity-80 mb-4">{{ alert.message }}</div>
  <form method="post">{% csrf_token %}
    <button class="px-4 py-2 rounded-lg bg-blue-600 text-white hover:opacity-90 transition">Acknowledge</button>
  </form>
</div>
{% endblock %}
