{% extends "admin/base_admin.html" %}
{% block content %}
<div class="p-5 rounded-xl bg-white dark:bg-slate-900 border">
  <div class="flex items-center justify-between">
    <h2 class="font-semibold">Risk Trend (Latest Samples)</h2>
    <span class="text-sm opacity-70">Uses ML if model.joblib exists</span>
  </div>
  <div class="mt-3">
    <canvas id="riskChart" height="90"></canvas>
  </div>
</div>

<script>
const labels = [{% for s in samples %}"{{ s.device.name }}",{% endfor %}].reverse();
const data = [{% for s in samples %}{{ s.risk_score|floatformat:3 }},{% endfor %}].reverse();

new Chart(document.getElementById('riskChart'), {
  type: 'line',
  data: { labels, datasets: [{ label: 'Risk Score', data }] },
});
</script>

<div class="mt-6 p-4 rounded-xl bg-white dark:bg-slate-900 border text-sm">
  {% for s in samples %}
    <div class="border-b border-slate-200 dark:border-slate-800 py-2">
      <b>{{ s.device.name }}</b> — {{ s.timestamp }} —
      <b>{{ s.risk_level }}</b> ({{ s.risk_score|floatformat:2 }})
    </div>
  {% empty %}
    <div class="opacity-70">No samples yet.</div>
  {% endfor %}
</div>
{% endblock %}
