{% extends "admin/base_admin.html" %}
{% block content %}
<div class="p-4 rounded-xl bg-white dark:bg-slate-900 border">
  {% for n in notes %}
    <a href="{% url 'notification_read' n.pk %}"
       class="block p-3 rounded-xl border border-slate-200 dark:border-slate-800 mb-2 hover:opacity-90 transition">
      <div class="flex justify-between">
        <div class="font-semibold">{{ n.title }}</div>
        {% if n.is_unread %}<span class="text-xs px-2 py-0.5 rounded-full bg-red-600 text-white">New</span>{% endif %}
      </div>
      <div class="text-sm opacity-80 mt-1">{{ n.body|truncatechars:160 }}</div>
      <div class="text-xs opacity-60 mt-1">{{ n.created_at }}</div>
    </a>
  {% empty %}
    <div class="opacity-70">No notifications.</div>
  {% endfor %}
</div>
{% endblock %}
