{% load static %}
<header class="flex items-center justify-between gap-3">
  <div class="flex items-center gap-3">
    <!-- Toggle button -->
    <button
      type="button"
      class="inline-flex items-center justify-center w-10 h-10 rounded-lg
             bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800
             hover:opacity-90 transition"
      @click="
        if (window.innerWidth < 768) { sidebarOpen = !sidebarOpen; }
        else { sidebarMini = !sidebarMini; }
      "
      aria-label="Toggle sidebar"
      title="Toggle sidebar"
    >
      <svg class="w-5 h-5 text-slate-800 dark:text-slate-200" viewBox="0 0 24 24" fill="none">
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>

    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-center">
        <img src="{% static 'images/Logo.png' %}" alt="PreventaB" class="w-full h-full object-contain p-1" />
      </div>
      <div class="leading-tight">
        <div class="text-lg font-bold">PreventaB</div>
        <div class="text-xs text-slate-600 dark:text-slate-400">{{ title }}</div>
      </div>
    </div>
  </div>

  <div class="flex items-center gap-2">
    <button onclick="toggleTheme()"
            class="px-3 py-2 rounded-lg bg-slate-100 dark:bg-slate-900 border border-slate-200 dark:border-slate-800
                   text-slate-800 dark:text-slate-200 hover:opacity-90 transition">
      🌗 Theme
    </button>

    <a href="{% url 'logout' %}"
       class="px-3 py-2 rounded-lg bg-red-600 text-white hover:opacity-90 transition">
      Logout
    </a>
  </div>
</header>
